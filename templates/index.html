<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER — AI Study Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="bg-grid"></div>
        <div class="bg-scanlines"></div>

        <!-- Header -->
        <header class="header">
            <div class="logo">
                <h1 class="logo-text">AETHER</h1>
            </div>
            <div class="status-hud">
                <span class="status-indicator">●</span>
                <span class="status-text">NEURAL CORE ONLINE</span>
                <div class="clock" id="clock"></div>
            </div>
        </header>

        <main class="main">
            <!-- AI Orb -->
            <div class="orb-container">
                <div class="ai-orb" id="orb">
                    <div class="orb-core"></div>
                    <div class="orb-glow"></div>
                    <div class="orb-ring"></div>
                </div>
            </div>

            <!-- Title -->
            <div class="title-section">
                <h2 class="main-title">AETHER</h2>
                <p class="subtitle">AI POWERED STUDY ASSISTANT</p>
            </div>

            <!-- Status -->
            <div class="status-display">
                <div class="status-bar" id="statusBar">
                    <span class="status-text-main" id="statusText">SYSTEM STANDBY</span>
                </div>
            </div>

            <!-- Log -->
            <div class="response-log">
                <div class="log-header">NEURAL INTERFACE LOG</div>
                <div class="log-content" id="logContent"></div>
            </div>

            <!-- Buttons -->
            <div class="controls">
                <button class="control-btn primary" id="voiceBtn">
                    <span class="btn-icon">🎤</span>
                    <span class="btn-text">ACTIVATE VOICE INTERFACE</span>
                </button>
                <button class="control-btn secondary" id="studyBtn">
                    <span class="btn-icon">📖</span>
                    <span class="btn-text">START STUDY MODE</span>
                </button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-tech">EMERGING TECHNOLOGY • AI VOICE INTERFACE</div>
            <div class="footer-creator">Created by: <strong>Ayush Gupta</strong> • Class XB</div>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
